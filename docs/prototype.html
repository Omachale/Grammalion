<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grammalion — Beam Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%; height: 100%;
        background: #000;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div style="position: fixed; top: 20px; right: 20px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; font-family: monospace; color: #00cccc; z-index: 1000;">
      <div style="margin-bottom: 12px;">
        <label style="display: block; margin-bottom: 8px; font-size: 12px;">Speed: <span id="speedLabel">1.0x</span></label>
        <input type="range" id="speedSlider" min="1" max="4" step="0.5" value="1" style="width: 150px; cursor: pointer;">
        <div style="font-size: 11px; margin-top: 4px; color: #888;">1x — 4x</div>
      </div>
      <button id="restartBtn" style="width: 100%; padding: 8px; background: #00cccc; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; font-family: monospace;">Restart</button>
    </div>
    <script src="prototype.js"></script>
  </body>
</html>
